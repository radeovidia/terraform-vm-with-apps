version: "3.9"

services:
  backend:
    build: ./backend
    container_name: go-backend
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    container_name: react-frontend

  nginx:
    image: nginx:alpine
    container_name: nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./frontend/react-app/build:/usr/share/nginx/html
    ports:
      - "80:80"
    depends_on:
      - backend
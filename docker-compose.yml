version: "3"

services:

 backend:
  build: ./backend
  container_name: backend

 frontend:
  build: ./frontend
  container_name: frontend

 nginx:
  image: nginx
  container_name: nginx
  ports:
   - "80:80"
  volumes:
   - ./nginx/nginx.conf:/etc/nginx/nginx.conf
  depends_on:
   - frontend
   - backend
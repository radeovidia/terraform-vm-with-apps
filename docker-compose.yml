services:
  backend:
    image: radovodoo/company-backend:latest
    container_name: company_be
    restart: always
    # Hapus ports 8080 agar lebih aman, komunikasi lewat network internal saja
    networks:
      - micro-net

  frontend:
    image: radovodoo/company-frontend:latest
    container_name: company_fe
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - micro-net

# Inilah 'ruangan' yang menyatukan mereka
networks:
  micro-net:
    driver: bridge
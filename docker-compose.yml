version: '3.8'

services:
  backend:
    image: radovodoo/company-backend:latest # PAKAI IMAGE, BUKAN BUILD
    container_name: company_be
    ports:
      - "8080:8080"
    restart: always

  frontend:
    image: radovodoo/company-frontend:latest # PAKAI IMAGE, BUKAN BUILD
    container_name: company_fe
    ports:
      - "80:80"
    # Catatan: Jika pakai volumes untuk nginx.conf, file config tersebut 
    # juga harus di-copy ke VM via SCP atau dimasukkan ke dalam Dockerfile.
    restart: always
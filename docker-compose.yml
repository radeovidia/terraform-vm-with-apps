version: '3.8'

services:
  backend:
    build: ./backend
    container_name: company_backend
    # Tidak perlu expose port ke host jika hanya lewat Nginx, tapi buat debug:
    ports:
      - "8080:8080"

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: company_frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

networks:
  default:
    name: company_network